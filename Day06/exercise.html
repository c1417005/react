<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 06 — 演習: Props でデータを渡す</title>

<!-- ① React 本体 / ② ReactDOM（画面描画・採点用） / ③ Babel(JSX翻訳) -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600..800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:#f6efe2; --ink:#1d1a2b; --ink-soft:#4a4660;
    --ember:#f04e2c; --ember-d:#c93a1c; --teal:#0e7c6b; --gold:#e8a200; --line:#e0d4bf; --card:#fffdf8;
  }
  * { box-sizing:border-box; }
  body { font-family:"Zen Kaku Gothic New", system-ui, "Meiryo", sans-serif; line-height:1.85;
    color:var(--ink); max-width:900px; margin:0 auto; padding:0 20px 90px;
    background:
      radial-gradient(900px 400px at 90% -5%, rgba(240,78,44,.06), transparent 60%),
      var(--paper); }
  .hero { margin:0 -20px 6px; padding:40px 26px 34px; color:#fdf6ea; border-radius:0 0 26px 26px;
    background:
      radial-gradient(500px 240px at 12% 0%, rgba(240,78,44,.5), transparent 60%),
      linear-gradient(135deg,#211b33,#0f1f1d);
    box-shadow:0 14px 36px rgba(27,24,48,.25); }
  .hero .kicker { font-family:"JetBrains Mono",monospace; font-size:.72rem; letter-spacing:.2em;
    color:#ffd9a8; text-transform:uppercase; }
  .hero h1 { font-family:"Bricolage Grotesque","Zen Kaku Gothic New",sans-serif; font-weight:800;
    margin:8px 0 6px; font-size:1.9rem; line-height:1.2; }
  .hero h1 .pop { color:var(--ember); }
  .hero p { margin:6px 0 0; color:#e7ddcf; }

  .lead { background:#fef7e6; border-left:5px solid var(--gold); padding:12px 18px;
    border-radius:0 10px 10px 0; margin:18px 0; }
  .lead code { background:#efe2cf; }

  h1 a, a { color:var(--ember-d); }
  code { font-family:"JetBrains Mono",monospace; font-size:.86em; background:#efe2cf;
    color:var(--ember-d); padding:2px 6px; border-radius:5px; }

  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 20px; margin:18px 0; box-shadow:0 6px 18px rgba(29,26,43,.05); }
  .card h2 { margin:0 0 6px; font-size:1.12em; font-family:"Zen Kaku Gothic New",sans-serif;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .status { font-weight:700; padding:3px 12px; border-radius:999px; font-size:.78em;
    font-family:"JetBrains Mono",monospace; letter-spacing:.03em; }
  .pass { background:#e3f6ec; color:#0b6b4f; border:1px solid #6bbf9a; }
  .fail { background:#fdecec; color:#c93a1c; border:1px solid #e39b8a; }
  .todo { background:#efe7d6; color:#6b6450; border:1px solid #cfc3aa; }
  .desc { color:var(--ink-soft); font-size:.92em; }
  .preview { border:1px dashed #c9bea6; border-radius:10px; padding:12px 16px; margin-top:12px;
    background:#fffdf6; }
  .preview-label { font-size:.74em; color:#9a8f76; margin-bottom:6px;
    font-family:"JetBrains Mono",monospace; letter-spacing:.05em; }
  .profile-card { border:1px solid var(--line); border-radius:10px; padding:10px 14px; margin:6px 0;
    background:#fff; }
  .panel { border:1px solid var(--teal); border-radius:10px; padding:8px 14px; background:#eef7f4; }
  pre { background:#1b1830; color:#f0bfae; padding:12px 14px; border-radius:10px; overflow-x:auto;
    font-size:.82em; font-family:"JetBrains Mono",monospace; }
  .hint { font-size:.86em; color:var(--ink-soft); margin-top:6px; }
  #results { margin-top:6px; }
</style>
</head>
<body>

<div class="hero">
  <div class="kicker">◆ Day 06 — 演習</div>
  <h1>Props を<span class="pop">渡して</span>みよう</h1>
  <p>親 → 子へデータを手渡す練習。書いて保存したら、下に合否が自動で出ます。</p>
</div>

<div class="lead">
  <strong>進め方:</strong> このファイル <code>Day06/exercise.html</code> をエディタで開き、各課題の
  <code>return null;</code> や空欄を自分のコードに置き換えて <strong>保存 → ブラウザで再読み込み</strong>してください。
  下に各課題の合否（✅/❌）と表示プレビューが出ます。未回答は「未回答」と表示されます。<br>
  解説は <code>Day06/lesson.html</code>。模範解答は出しません。書けたらコードを貼ってレビューに出してください。
</div>

<div id="results"></div>

<!-- ===================================================================
     ここから下が「あなたが編集する場所」です。
==================================================================== -->
<script type="text/babel" data-presets="react">

// =====================================================================
//  完成済みの「子コンポーネント」たち（編集しません。演習で使います）
// =====================================================================

// 税込価格を計算して表示する子。price という props を受け取る。
function PriceTag({ price }) {
  return <p>定価 {price} 円 ／ 税込 {Math.round(price * 1.1)} 円</p>;
}

// 名前と役割を表示する子（演習6で使う）。
function UserCard({ name, role }) {
  return (
    <div className="profile-card">
      <strong>{name}</strong> — <span>{role}</span>
    </div>
  );
}


// =====================================================================
//  演習（ここを編集します）
// =====================================================================

// --- 演習1（やさしい）: props で受け取って表示する ------------------
// 子コンポーネント Hello を完成させてください。
// ・親(Exercise1)は <Hello name="やまだ" /> と名前を渡しています。
// ・Hello の中で、その名前を <h2> で「こんにちは、やまだ さん」と表示してください。
// ・ヒント: 受け取った props は props.name で取り出せます。
function Hello(props) {
  // ここにコードを書いてください（props.name を使う）
  return <h2>こんにちは、 {props.name} さん</h2>;
}
function Exercise1() {       // ← 親。ここは編集しません
  return <Hello name="やまだ" />;
}


// --- 演習2（ふつう）: 分割代入で受け取る --------------------------
// 子コンポーネント Member を完成させてください。
// ・親は <Member name="さとう" age={20} /> を渡しています。
// ・引数を { name, age } の「分割代入」で受け取り、
//   <p>さとう さん（20歳）</p> のように表示してください。
function Member(/* ここで { name, age } を分割代入で受け取る */
{name,age}) {
  // ここにコードを書いてください
  return <p>{name} さん ({age}歳) </p> ;
}
function Exercise2() {       // ← 親。編集しません
  return <Member name="さとう" age={20} />;
}


// --- 演習3（ふつう）: 数値を { } で渡す ---------------------------
// 上にある完成済みの PriceTag に、price として 500 を渡してください。
// ・数値なので " " ではなく { } で渡すこと（price={500}）。
// ・PriceTag が税込価格（550円）を自動計算して表示します。
function Exercise3() {
  // ここにコードを書いてください（<PriceTag ... /> を return）
  return <PriceTag price = {500}/>;
}


// --- 演習4（ふつう）: デフォルト値 -------------------------------
// 子コンポーネント Box を完成させてください。
// ・親(Exercise4)は <Box /> と書いていて、size を渡していません。
// ・size を受け取りますが、渡されなかったときは 100 を使う「デフォルト値」を付けてください。
// ・<p>サイズ: 100</p> のように表示してください。
// ・ヒント: { size = 100 } のように = で初期値を書きます。
function Box(/* ここで size を受け取り、デフォルト値 100 を付ける */  {size = 100}) {
  // ここにコードを書いてください
  return <p>サイズ: {size}</p>;
}
function Exercise4() {       // ← 親。編集しません（size を渡していない）
  return <Box />;
}


// --- 演習5（ちょいむず）: children でラッパーを作る ----------------
// 子コンポーネント Panel を完成させてください。
// ・Panel は「枠」だけを用意し、中身は使う人が差し込めるようにします。
// ・<div className="panel"> の中に、受け取った children を表示してください。
// ・ヒント: 引数で { children } を受け取り、{children} を JSX に置きます。
function Panel(/* ここで children を受け取る */
  {children}
) { // ここにコードを書いてください
  return <div className = "panel">
    {children}
    <h3>おはよう</h3>
    </div>;
}
function Exercise5() {       // ← 親。編集しません
  return (
    <Panel>
      <h2>お知らせ</h2>
      <p>本日は晴天なり</p>
    </Panel>
  );
}


// --- 演習6（むず・総合）: map で props を配列分わたす ---------------
// users 配列を map して、1人ずつ <UserCard /> に name と role を渡してください。
// ・全体は <div> で包むこと。
// ・各 <UserCard> には key={...} を付けること（id を使うと良い）。
// ・UserCard は上に完成済み（name と role を受け取って表示します）。
function Exercise6() {
  const users = [
    { id: 1, name: "山田 花子", role: "エンジニア" },
    { id: 2, name: "田中 太郎", role: "デザイナー" },
    { id: 3, name: "鈴木 一郎", role: "プロダクトマネージャー" },
  ];

  // ここにコードを書いてください
  // users.map((u) => <UserCard ... key={...} />) を <div> で包んで return
  return <div>
    {users.map((user) => <UserCard key = {user.id} name ={user.name} role = {user.role}></UserCard>)}
     </div>;
    }
    //divとかで作った枠の中でmapを回す。


// =====================================================================
//  採点ハーネス（ここから下は編集しません）
// =====================================================================
const norm = (s) => (s || "").replace(/\s+/g, " ").trim();

function evaluate(Comp) {
  const container = document.createElement("div");
  try {
    const root = ReactDOM.createRoot(container);
    ReactDOM.flushSync(() => {
      root.render(React.createElement(Comp));
    });
    const result = { ok: true, html: container.innerHTML, text: norm(container.textContent) };
    root.unmount();
    return result;
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

const TASKS = [
  {
    n: 1, title: "演習1: props で受け取って表示",
    desc: "props.name で「やまだ」を h2 表示",
    Comp: Exercise1,
    check: (html, text) => /<h2/.test(html) && text.includes("やまだ"),
  },
  {
    n: 2, title: "演習2: 分割代入で受け取る",
    desc: "{ name, age } で「さとう」「20」を表示",
    Comp: Exercise2,
    check: (html, text) => text.includes("さとう") && text.includes("20"),
  },
  {
    n: 3, title: "演習3: 数値を { } で渡す",
    desc: "PriceTag に price={500} → 税込 550 円",
    Comp: Exercise3,
    check: (html, text) => text.includes("550"),
  },
  {
    n: 4, title: "演習4: デフォルト値",
    desc: "size 未指定 → 100 が表示される",
    Comp: Exercise4,
    check: (html, text) => text.includes("100"),
  },
  {
    n: 5, title: "演習5: children でラッパー",
    desc: "panel の中に お知らせ / 本日は晴天なり",
    Comp: Exercise5,
    check: (html, text) =>
      /class="[^"]*\bpanel\b[^"]*"/.test(html) &&
      text.includes("お知らせ") && text.includes("本日は晴天なり"),
  },
  {
    n: 6, title: "演習6: map で props を配列分わたす（総合）",
    desc: "UserCard 3枚（名前・役割つき）",
    Comp: Exercise6,
    check: (html, text) => {
      const cardCount = (html.match(/class="[^"]*profile-card[^"]*"/g) || []).length;
      return cardCount === 3 &&
        ["山田 花子", "田中 太郎", "鈴木 一郎"].every((n) => text.includes(n)) &&
        ["エンジニア", "デザイナー", "プロダクトマネージャー"].every((r) => text.includes(r));
    },
  },
];

function badge(kind, label) {
  return `<span class="status ${kind}">${label}</span>`;
}

function run() {
  const root = document.getElementById("results");
  let html = "";
  for (const t of TASKS) {
    const r = evaluate(t.Comp);
    let status, previewHtml = "", note = "";

    if (!r.ok) {
      status = badge("fail", "エラー");
      note = `<pre>${r.error}</pre>`;
    } else if (r.html.trim() === "") {
      status = badge("todo", "未回答");
    } else if (t.check(r.html, r.text)) {
      status = badge("pass", "✅ 合格");
      previewHtml = r.html;
    } else {
      status = badge("fail", "❌ もう少し");
      previewHtml = r.html;
      note = `<div class="hint">いまの表示テキスト: 「${r.text}」</div>`;
    }

    const preview = previewHtml
      ? `<div class="preview"><div class="preview-label">▼ 実際の表示プレビュー</div>${previewHtml}</div>`
      : "";

    html += `
      <div class="card">
        <h2>${t.title} ${status}</h2>
        <div class="desc">目標: ${t.desc}</div>
        ${preview}
        ${note}
      </div>`;
  }
  root.innerHTML = html;
}

run();
</script>
</body>
</html>
